<!DOCTYPE html>
<html>
<head>
  <title>Task Manager - Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <style>
    *{box-sizing:border-box;font-family:'Segoe UI',sans-serif}
    body{
      margin:0;height:100vh;display:flex;align-items:center;justify-content:center;
      background:linear-gradient(135deg,#4facfe,#00f2fe);
    }
    .card{
      width:320px;background:#fff;padding:28px;border-radius:16px;
      box-shadow:0 20px 40px rgba(0,0,0,.2);animation:fade .6s ease;
    }
    @keyframes fade{from{opacity:0;transform:translateY(20px)}to{opacity:1}}
    h2{text-align:center;margin-bottom:18px}
    input{
      width:100%;padding:12px;margin:8px 0;border-radius:10px;border:1px solid #ddd;
      transition:.2s;
    }
    input:focus{border-color:#4facfe;outline:none;box-shadow:0 0 5px rgba(79,172,254,.5)}
    button{
      width:100%;padding:12px;margin-top:10px;border:none;border-radius:10px;
      background:#4facfe;color:#fff;font-weight:bold;cursor:pointer;transition:.2s;
    }
    button:hover{background:#00c6ff}
    #msg{text-align:center;margin-top:10px;color:red}
  </style>
  <p>Don't have an account? <a href="signup.html">Register</a></p>



</head>
<body>

<div class="card">
  <h2>Welcome 👋</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
  <p id="msg"></p>
</div>

<script>
async function login(){
  const email=document.getElementById("email").value;
  const password=document.getElementById("password").value;

  const res=await fetch("http://localhost:5000/api/auth/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({email,password})
  });

  const data=await res.json();

  if(data.token){
    localStorage.setItem("token",data.token);
    window.location.href="dashboard.html";
  }else{
    document.getElementById("msg").innerText="Invalid credentials ❌";
  }
}
</script>

</body>
</html>
